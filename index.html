<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Survival Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Fixed Advice Button -->
    <button id="adviceBtn" class="advice-button">Advice</button>

    <h1 class="title fade-in">Party Survival Guide</h1>
    <p class="subtitle fade-in">Scroll for simple, safe tips</p>

    <div id="tips-container"></div>

    <!-- Advice Popup -->
    <div id="adviceModal" class="modal">
        <div class="modal-content fade-in">
            <span id="closeAdvice" class="close">&times;</span>
            <h2>Helpful Contacts</h2>
            <ul>
                <li><strong>Childline:</strong> 0800 1111</li>
                <li><strong>NHS 111:</strong> Non‑emergency medical advice</li>
                <li><strong>CEOP:</strong> Report online safety concerns</li>
                <li><strong>Samaritans:</strong> 116 123</li>
            </ul>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
